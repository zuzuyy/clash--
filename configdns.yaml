# ========================================================
# 深度优化增强版 configdns.yaml (高性能 & 防泄露)
# ========================================================

proxy-providers:
  Airport1:
    url: "订阅地址"
    type: http
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    proxy: 直连

proxies:
  - {name: 直连, type: direct}

# 全局配置优化
mixed-port: 7890
allow-lan: true
bind-address: "*"
ipv6: false
unified-delay: true
tcp-concurrent: true
log-level: warning
client-fingerprint: chrome
udp: true # 开启 UDP 支持
endpoint-independent-forwarding: true # 增强 NAT 兼容性
keep-alive-idle: 600
keep-alive-interval: 15
profile:
  store-selected: true
  store-fake-ip: true

sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - "Mijia Cloud"
    - "+.push.apple.com"
    - "+.apple.com"

tun:
  enable: true
  stack: mixed
  dns-hijack: ["any:53", "tcp://any:53"]
  auto-route: true # 建议开启以自动接管路由
  auto-detect-interface: true # 自动检测网卡
  auto-redirect: false

dns:
  enable: true
  cache-algorithm: arc
  listen: 0.0.0.0:1053
  ipv6: false
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 28.0.0.1/8
  fake-ip-filter-mode: blacklist
  # 启动 DNS：使用 IP 跳过域名递归
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - 1.1.1.1
  # 代理服务器域名解析
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query
  # 核心解析策略：强制国内 DOH 走直连，国外 DOH 走代理
  nameserver:
    - https://dns.alidns.com/dns-query#直连
    - https://doh.pub/dns-query#直连
    - https://8.8.8.8/dns-query#🚀 默认代理&ecs=223.5.5.0/24
  fake-ip-filter:
    - "rule-set:fakeipfilter_domain"

proxy-groups:
  - {name: 🚀 默认代理, type: select, proxies: [🔯 香港故转, 🔯 台湾故转, 🔯 日本故转, 🔯 狮城故转, 🔯 美国故转, ♻️ 自动选择, 🌐 全部节点, 直连]}
