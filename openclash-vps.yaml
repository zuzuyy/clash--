{
  "log": {
    "level": "warn",
    "timestamp": true
  },
  "dns": {
    "servers": [
      {
        "tag": "dns_local",
        "address": "211.142.211.124",
        "detour": "direct"
      },
      {
        "tag": "dns_ali",
        "address": "https://223.5.5.5/dns-query",
        "detour": "direct"
      },
      {
        "tag": "dns_proxy",
        "address": "https://8.8.8.8/dns-query",
        "detour": "🚀 默认代理"
      },
      {
        "tag": "dns_fakeip",
        "address": "fakeip"
      }
    ],
    "rules": [
      { "outbound": "any", "server": "dns_local" },
      { "query_type": [ "A", "AAAA" ], "server": "dns_fakeip" },
      { "rule_set": [ "geosite-cn" ], "server": "dns_ali" },
      { "rule_set": [ "geosite-geolocation-!cn" ], "server": "dns_proxy" }
    ],
    "fakeip": {
      "enabled": true,
      "inet4_range": "28.0.0.1/8"
    },
    "strategy": "ipv4_only",
    "independent_cache": true
  },
  "inbounds": [
    {
      "type": "tun",
      "tag": "tun-in",
      "interface_name": "tun0",
      "address": [ "172.19.0.1/30" ],
      "auto_route": true,
      "strict_route": true,
      "stack": "mixed",
      "sniff": true,
      "sniff_override_destination": true
    },
    {
      "type": "mixed",
      "listen": "0.0.0.0",
      "listen_port": 7890,
      "sniff": true
    }
  ],
  "outbounds": [
    { "type": "selector", "tag": "🚀 默认代理", "outbounds": [ "♻️ 自动选择", "🔯 香港故转", "直连" ] },
    { "type": "selector", "tag": "🤖 ChatGPT", "outbounds": [ "🔯 美国故转", "🚀 默认代理" ] },
    { "type": "selector", "tag": "♊ Gemini", "outbounds": [ "🔯 美国故转", "🚀 默认代理" ] },
    { "type": "selector", "tag": "📹 YouTube", "outbounds": [ "🔯 香港故转", "🚀 默认代理" ] },
    { "type": "urltest", "tag": "♻️ 自动选择", "outbounds": [ "{all}" ], "url": "https://www.gstatic.com/generate_204", "interval": "5m" },
    { "type": "direct", "tag": "direct" },
    { "type": "direct", "tag": "直连" },
    { "type": "dns", "tag": "dns-out" }
  ],
  "route": {
    "auto_detect_interface": true,
    "rules": [
      { "protocol": "dns", "outbound": "dns-out" },
      { "rule_set": "private", "outbound": "直连" },
      { "rule_set": "openai", "outbound": "🤖 ChatGPT" },
      { "rule_set": "google", "outbound": "♊ Gemini" },
      { "rule_set": "youtube", "outbound": "📹 YouTube" },
      { "rule_set": "telegram", "outbound": "🚀 默认代理" },
      { "rule_set": "geosite-cn", "outbound": "直连" },
      { "rule_set": "geoip-cn", "outbound": "直连" },
      { "ip_is_private": true, "outbound": "直连" }
    ],
    "rule_set": [
      {
        "tag": "private",
        "type": "remote",
        "format": "binary",
        "url": "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/sing/geo/geosite/private.srs"
      },
      {
        "tag": "openai",
        "type": "remote",
        "format": "binary",
        "url": "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/sing/geo/geosite/openai.srs"
      },
      {
        "tag": "google",
        "type": "remote",
        "format": "binary",
        "url": "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/sing/geo/geosite/google.srs"
      },
      {
        "tag": "youtube",
        "type": "remote",
        "format": "binary",
        "url": "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/sing/geo/geosite/youtube.srs"
      },
      {
        "tag": "telegram",
        "type": "remote",
        "format": "binary",
        "url": "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/sing/geo/geosite/telegram.srs"
      },
      {
        "tag": "geosite-cn",
        "type": "remote",
        "format": "binary",
        "url": "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/sing/geo/geosite/cn.srs"
      },
      {
        "tag": "geosite-geolocation-!cn",
        "type": "remote",
        "format": "binary",
        "url": "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/sing/geo/geosite/geolocation-!cn.srs"
      },
      {
        "tag": "geoip-cn",
        "type": "remote",
        "format": "binary",
        "url": "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/sing/geo/geoip/cn.srs"
      }
    ],
    "final": "🚀 默认代理"
  }
