# 超小白说明版（只改一行就能用）
# 用法：
# 1. 在机场后台找到 Clash.Meta / Mihomo 订阅链接
# 2. 找到下面 `proxy-providers -> 机场订阅 -> url` 这一行
# 3. 把 `https://example.com/replace-with-your-subscription` 整段替换成你自己的订阅链接
# 4. 除了这一行，其他内容都不要改
# 5. 保存后导入客户端，打开“节点选择”，选“自动选择”或你想用的节点

mixed-port: 7890
redir-port: 7892
tproxy-port: 7895
allow-lan: true
bind-address: "*"
mode: rule
log-level: info
ipv6: false
unified-delay: true
tcp-concurrent: true
geodata-mode: true

dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: rule
  fake-ip-filter:
    # 银行 / 支付（显式保险，GEOSITE 库更新有延迟）
    - DOMAIN-SUFFIX,alipay.com,real-ip
    - DOMAIN-SUFFIX,alipayobjects.com,real-ip
    - DOMAIN-SUFFIX,alipayhk.com,real-ip
    - DOMAIN-SUFFIX,antgroup.com,real-ip
    - DOMAIN-SUFFIX,antfinancial.com,real-ip
    - DOMAIN-SUFFIX,tenpay.com,real-ip
    - DOMAIN-SUFFIX,wechat.com,real-ip
    - DOMAIN-SUFFIX,wechatpay.cn,real-ip
    - DOMAIN-SUFFIX,weixin.qq.com,real-ip
    - DOMAIN-SUFFIX,wx.qq.com,real-ip
    - DOMAIN-SUFFIX,unionpay.com,real-ip
    - DOMAIN-SUFFIX,unionpaysecure.com,real-ip
    - DOMAIN-SUFFIX,95516.com,real-ip
    # 国内 / 私有域名全覆盖
    - GEOSITE,private,real-ip
    - GEOSITE,cn,real-ip
    # 系统 / 网络检测
    - DOMAIN-SUFFIX,localhost,real-ip
    - DOMAIN-SUFFIX,local,real-ip
    - DOMAIN-SUFFIX,lan,real-ip
    - DOMAIN-SUFFIX,msftconnecttest.com,real-ip
    - DOMAIN-SUFFIX,msftncsi.com,real-ip
    - DOMAIN-KEYWORD,time,real-ip
    - DOMAIN-KEYWORD,ntp,real-ip
    - MATCH,fake-ip
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29

  # 优化核心：按域名策略选择 DNS 服务器，避免国内域名误触 fallback 走代理 DNS
  nameserver-policy:
    # 国内域名 → 强制使用国内 DNS，防止银行 / 支付域名被代理解析
    "geosite:cn,private":
      - 223.5.5.5
      - 119.29.29.29
      - https://dns.alidns.com/dns-query
      - https://doh.pub/dns-query
    # 国外域名 → 走代理 DNS，防止污染
    "geosite:geolocation-!cn":
      - "https://8.8.8.8/dns-query#节点选择"
      - "https://1.1.1.1/dns-query#节点选择"

  nameserver:
    - "https://1.1.1.1/dns-query#节点选择"
    - "https://8.8.8.8/dns-query#节点选择"

  proxy-server-nameserver:
    - 223.5.5.5
    - 119.29.29.29

  direct-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query

  direct-nameserver-follow-policy: true

proxy-providers:
  机场订阅:
    type: http
    url: "https://example.com/replace-with-your-subscription"
    path: ./proxy_providers/airport.yaml
    interval: 3600
    header:
      User-Agent:
        - "clash-verge/v2.0.0"
    # 可选：只保留某些节点，例如港新日美
    # filter: "(?i)港|hk|hong kong|新|sg|singapore|日|jp|japan|美|us|united states"
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300

proxy-groups:
  - name: 自动选择
    type: url-test
    use:
      - 机场订阅
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50

  - name: 节点选择
    type: select
    use:
      - 机场订阅
    proxies:
      - 自动选择
      - DIRECT

  - name: 国外服务
    type: select
    proxies:
      - 节点选择
      - 自动选择
      - DIRECT

  - name: AI服务
    type: select
    proxies:
      - 节点选择
      - 自动选择
      - DIRECT

  - name: 流媒体
    type: select
    proxies:
      - 节点选择
      - 自动选择
      - DIRECT

  - name: 漏网之鱼
    type: select
    proxies:
      - 节点选择
      - 自动选择
      - DIRECT

