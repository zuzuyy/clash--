# ========================================================
# OpenClash 深度优化配置 (高性能 | 防泄露 | 易维护)
# 优化方向：DNS防泄漏、节点智能切换、规则高效匹配、资源占用优化
# ========================================================

# 基础全局配置
port: 7891          # HTTP代理端口
socks-port: 7892    # SOCKS5代理端口
mixed-port: 7890    # 混合代理端口（推荐主用）
allow-lan: true     # 允许局域网访问
bind-address: "*"   # 绑定所有网卡
ipv6: false         # 关闭IPv6（按需开启）
unified-delay: true # 统一延迟计算
tcp-concurrent: true # 开启TCP并发
log-level: warning  # 日志级别（仅警告）
client-fingerprint: chrome # 客户端指纹（模拟Chrome）
udp: true           # 开启UDP支持
endpoint-independent-forwarding: true # 增强NAT兼容性
mode: rule          # 规则模式（核心）
external-controller: 127.0.0.1:9090 # 外部控制端口

# 连接优化
connection:
  keep-alive-idle: 600      # 连接空闲超时
  keep-alive-interval: 15   # 保活间隔
  tcp-fast-open: true       # 开启TCP快速打开
  tcp-mptcp: false          # 按需开启MPTCP
  udp-fragment: true        # UDP分片支持

# 配置缓存与存储
profile:
  store-selected: true      # 保存选中的节点
  store-fake-ip: true       # 保存FakeIP映射
  cache-file: ./cache.db    # 缓存文件路径

# 抓包嗅探配置（优化匹配精度）
sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true # 覆盖目标地址
    TLS:
      ports: [443, 8443]
      skip-cert-verify: false    # 不跳过证书验证
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - "Mijia Cloud"
    - "+.push.apple.com"
    - "+.apple.com"
    - "+.icloud.com"
    - "+.microsoft.com"

# TUN模式配置（系统级代理）
tun:
  enable: true
  stack: mixed              # 混合栈（gvisor+system）
  dns-hijack: ["any:53", "tcp://any:53"] # 劫持所有DNS请求
  auto-route: true          # 自动接管路由
  auto-detect-interface: true # 自动检测网卡
  auto-redirect: false      # 手动控制重定向
  mtu: 1500                 # 网络MTU值
  strict-route: true        # 严格路由模式

# DNS配置（防泄露核心）
dns:
  enable: true
  cache: true               # 开启DNS缓存
  cache-algorithm: arc      # 高效缓存算法
  cache-size: 2048        # 降低缓存条目
  cache-ttl: 300          # 缓存5分钟（国内CDN适配）
  listen: 0.0.0.0:1053      # DNS监听端口
  ipv6: false
  respect-rules: true       # 规则生效于DNS解析
  enhanced-mode: fake-ip    # FakeIP模式（防DNS泄露）
  fake-ip-range: 28.0.0.1/8 # FakeIP网段
  fake-ip-filter-mode: blacklist # FakeIP过滤模式
  fake-ip-filter:
    - "rule-set:fakeipfilter_domain"
    - "+.local"
    - "+.lan"
    - "+.home"
  
  # 基础DNS服务器（直连）
  default-nameserver:
    - 223.5.5.5             # 阿里DNS
    - 119.29.29.29          # 腾讯DNS
    - 180.76.76.76          # 百度DNS
  
  # 代理节点域名解析专用
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query # 阿里DOH
    - https://doh.pub/dns-query        # 360 DOH
  
  # 核心DNS解析策略（按场景分流）
  nameserver:
    - https://dns.alidns.com/dns-query#直连  # 国内域名
    - https://doh.pub/dns-query#直连         # 国内域名
    - https://8.8.8.8/dns-query#🚀 默认代理&ecs=223.5.5.0/24 # 国外域名

# 代理节点订阅配置
proxy-providers:
  Airport:
    url: "订阅地址"       # 替换为实际订阅地址
    type: http
    interval: 86400         # 24小时更新一次
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204 # 健康检查地址
      interval: 300         # 5分钟检查一次
      timeout: 5            # 检查超时时间
    proxy: 直连             # 订阅更新走直连
    path: ./providers/Airport1.yaml # 订阅缓存路径

# 基础代理节点
proxies:
  - name: 直连
    type: direct
  - name: 本地DNS
    type: direct
    interface-name: eth0    # 替换为实际网卡名（按需）

