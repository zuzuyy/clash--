# ========================================================
# 终极优化增强版 - 整合高性能架构与精细化分流 (修正版)
# ========================================================

# 1. 锚点配置 (定义复用模板)
rule-anchor:
  # 订阅源基础模板
  BaseProvider: &BaseProvider 
    type: http
    interval: 86400
    proxy: DIRECT
    health-check: 
      enable: true
      url: 'https://www.gstatic.com/generate_204'
      interval: 300
  # 规则集基础模板
  ip: &ip {type: http, interval: 86400, behavior: ipcidr, format: mrs}
  domain: &domain {type: http, interval: 86400, behavior: domain, format: mrs}

# 2. 代理提供者 (在此输入您的机场订阅地址)
proxy-providers:
  MyAirport: # 机场名称，可自定义
    <<: *BaseProvider
    # 👇 请在下方引号内粘贴您的机场订阅链接
    url: "你的订阅链接" 

# 3. 基础设置
client-fingerprint: chrome
mixed-port: 7890
allow-lan: true
ipv6: false 
log-level: warning
unified-delay: true
tcp-concurrent: true

sniffer:
  enable: true
  sniff:
    HTTP: {ports: [80, 8080-8880], override-destination: true}
    TLS: {ports: [443, 8443]}
    QUIC: {ports: [443, 8443]}
  skip-domain: ['Mijia Cloud', '+.push.apple.com', '+.apple.com']

tun:
  enable: true
  stack: mixed
  auto-route: true
  auto-detect-interface: true
  dns-hijack: ["any:53"]

# 4. DNS 优化 (精细化防泄露)
dns:
  enable: true
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 28.0.0.1/8
  cache-algorithm: arc
  respect-rules: true
  nameserver:
    - https://dns.alidns.com/dns-query#DIRECT
    - https://doh.pub/dns-query#DIRECT
    - https://8.8.8.8/dns-query#🚀 默认代理&ecs=223.5.5.0/24

# 5. 代理策略组 (已修复“直连”报错问题)
proxy-groups:
  - {name: 🚀 默认代理, type: select, proxies: [♻️ 自动选择, 🔯 香港故转, 🔯 美国故转, 🔯 狮城故转, DIRECT]}
  
  - {name: ♻️ 自动选择, type: url-test, include-all: true, interval: 300, tolerance: 50}
  
  - {name: 🤖 AI服务, type: select, proxies: [🔯 美国故转, 🔯 狮城故转, 🔯 日本故转, 🚀 默认代理]}
  
  - {name: 📹 国际媒体, type: select, proxies: [🔯 香港故转, 🔯 狮城故转, 🔯 台湾故转, 🚀 默认代理]}
  
  # 地区节点组 (自动筛选)
  - {name: 🔯 香港故转, type: fallback, include-all: true, filter: "(?i)HK|香港", interval: 300}
  - {name: 🔯 美国故转, type: fallback, include-all: true, filter: "(?i)US|美国", interval: 300}
  - {name: 🔯 狮城故转, type: fallback, include-all: true, filter: "(?i)SG|新加坡|狮城", interval: 300}
  - {name: 🔯 台湾故转, type: fallback, include-all: true, filter: "(?i)TW|台湾", interval: 300}
  - {name: 🔯 日本故转, type: fallback, include-all: true, filter: "(?i)JP|日本", interval: 300}
  
  - {name: 💡 手动直连, type: select, proxies: [DIRECT]}
  
  - {name: 🐟 漏网之鱼, type: select, proxies: [🚀 默认代理, DIRECT]}

# 6. 规则路由
rules:
  - RULE-SET,private_ip,DIRECT,no-resolve
  - RULE-SET,private_domain,DIRECT
  - RULE-SET,ai,🤖 AI服务
  - RULE-SET,gemini,🤖 AI服务
  - RULE-SET,telegram_domain,🚀 默认代理
  - RULE-SET,youtube_domain,📹 国际媒体
  - RULE-SET,netflix_domain,📹 国际媒体
  - RULE-SET,google_domain,🚀 默认代理
  - RULE-SET,apple_domain,DIRECT
  - RULE-SET,github_domain,🚀 默认代理
  - RULE-SET,cn_domain,DIRECT
  - RULE-SET,cn_ip,DIRECT,no-resolve
  - MATCH,🐟 漏网之鱼

# 7. 规则提供者
rule-providers:
  private_domain: { <<: *domain, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/private.mrs"}
  ai: { <<: *domain, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/openai.mrs" }
  gemini: { <<: *domain, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/google-gemini.mrs" }
  youtube_domain: { <<: *domain, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/youtube.mrs"}
  netflix_domain: { <<: *domain, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/netflix.mrs"}
  telegram_domain: { <<: *domain, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/telegram.mrs"}
  google_domain: { <<: *domain, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/google.mrs"}
  github_domain: { <<: *domain, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/github.mrs"}
  apple_domain: { <<: *domain, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/apple.mrs"}
  cn_domain: { <<: *domain, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/cn.mrs"}
  private_ip: {<<: *ip, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip/private.mrs"}
  cn_ip: { <<: *ip, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip/cn.mrs"}
