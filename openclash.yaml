# ========================================================
# 终极优化增强版 (流媒体定制版) - 针对 Netflix, Disney+, HBO, Prime Video
# ========================================================

# 1. 锚点配置
rule-anchor:
  BaseProvider: &BaseProvider {type: http, interval: 86400, proxy: DIRECT, health-check: {enable: true, url: 'https://www.gstatic.com/generate_204', interval: 300}}
  ip: &ip {type: http, interval: 86400, behavior: ipcidr, format: mrs}
  domain: &domain {type: http, interval: 86400, behavior: domain, format: mrs}

# 2. 代理提供者
proxy-providers:
  MyAirport:
    <<: *BaseProvider
    url: "您的机场订阅地址" 

# 3. 基础设置
mixed-port: 7890
allow-lan: true
bind-address: "*"
ipv6: false
unified-delay: true
tcp-concurrent: true
log-level: warning
client-fingerprint: chrome
udp: true # 开启 UDP 支持
endpoint-independent-forwarding: true # 增强 NAT 兼容性
keep-alive-idle: 600
keep-alive-interval: 15
profile:
  store-selected: true
  store-fake-ip: true

sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - "Mijia Cloud"
    - "+.push.apple.com"
    - "+.apple.com"

tun:
  enable: true
  stack: mixed
  dns-hijack: ["any:53", "tcp://any:53"]
  auto-route: true # 建议开启以自动接管路由
  auto-detect-interface: true # 自动检测网卡
  auto-redirect: false

# 4. DNS 配置 (防泄露优化)
dns:
  enable: true
  cache-algorithm: arc
  listen: 0.0.0.0:1053  # 确保与 OpenClash 设置一致
  ipv6: false
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 28.0.0.1/8
  
  # 1. 解决冷启动问题：解析 DNS 自身的域名和机场域名
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - 1.1.1.1
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query

  # 2. 核心分流：国内 DOH 直连，国外 DOH 代理
  nameserver:
    - https://dns.alidns.com/dns-query#DIRECT
    - https://doh.pub/dns-query#DIRECT
    - https://8.8.8.8/dns-query#🚀 默认代理&ecs=223.5.5.0/24

  # 3. 基础兼容性过滤 (解决内网与测速问题)
  fake-ip-filter:
    - "rule-set:fakeipfilter_domain"

# 5. 代理策略组 (核心变动部分)
proxy-groups:
  - {name: 🚀 默认代理, type: select, proxies: [♻️ 自动选择, 🔯 香港故转, 🔯 美国故转, 🔯 台湾故转, 🔯 狮城故转, 🌐 全部节点]}
  
  - {name: ♻️ 自动选择, type: url-test, include-all: true, interval: 300, tolerance: 50}
  
  - {name: 🤖 AI服务, type: select, proxies: [🔯 美国故转, 🔯 狮城故转, 🔯 台湾故转, 🔯 日本故转, 🚀 默认代理]}
  
  # 👇 针对您的需求：流媒体专用组，仅保留 美/港/新 节点选择
  - {name: 📹 YouTube, type: select, proxies: [♻️ 自动选择, 🔯 香港故转, 🔯 美国故转, 🔯 台湾故转, 🔯 狮城故转, DIRECT]}
  
  - {name: 🎥 NETFLIX, type: select, proxies: [♻️ 自动选择, 🔯 香港故转, 🔯 美国故转, 🔯 台湾故转, 🔯 狮城故转, DIRECT]}
  
  - {name: 🏰 Disney, type: select, proxies: [♻️ 自动选择, 🔯 香港故转, 🔯 美国故转, 🔯 台湾故转, 🔯 狮城故转, DIRECT]}
  
  - {name: 🎬 HBO, type: select, proxies: [♻️ 自动选择, 🔯 香港故转, 🔯 美国故转, 🔯 台湾故转, 🔯 狮城故转, DIRECT]}

  - {name: 🎬 PrimeVideo, type: select, proxies: [♻️ 自动选择, 🔯 香港故转, 🔯 美国故转, 🔯 台湾故转, 🔯 狮城故转, DIRECT]}

  - {name: 🎵 Spotify, type: select, proxies: [♻️ 自动选择, 🔯 香港故转, 🔯 美国故转, 🔯 台湾故转, 🔯 狮城故转, DIRECT]}

  - {name: 🎵 TikTok, type: select, proxies: [🔯 日本故转, 🔯 台湾故转, 🔯 狮城故转, 🔯 美国故转, 🔯 香港故转, ♻️ 自动选择]}

  - {name: 🪟 Microsoft, type: select, proxies: [DIRECT, 🚀 默认代理]}

  - {name: 👨🏿‍💻 GitHub, type: select, proxies: [♻️ 自动选择, 🔯 香港故转, 🔯 美国故转, 🔯 台湾故转, 🔯 狮城故转, DIRECT]}
  
  # 👇 针对您的疑问：Steam/PayPal 默认走这个低延迟自动组或直连
  - {name: 🎮 Steam, type: select, proxies: [DIRECT, ♻️ 自动选择, 🔯 香港故转, 🔯 美国故转, 🔯 台湾故转, 🔯 狮城故转, 🚀 默认代理]}

  - {name: 💶 Paypal, type: select, proxies: [DIRECT, ♻️ 自动选择, 🔯 香港故转, 🔯 美国故转, 🔯 台湾故转, 🔯 狮城故转, 🚀 默认代理]}

  # 地区节点自动筛选
  - {name: 🔯 香港故转, type: fallback, include-all: true, filter: "(?i)HK|香港", interval: 300}
  - {name: 🔯 美国故转, type: fallback, include-all: true, filter: "(?i)US|美国", interval: 300}
  - {name: 🔯 狮城故转, type: fallback, include-all: true, filter: "(?i)SG|新加坡|狮城", interval: 300}
  - {name: 🔯 台湾故转, type: fallback, include-all: true, filter: "(?i)TW|台湾", interval: 300}
  - {name: 🔯 日本故转, type: fallback, include-all: true, filter: "(?i)JP|日本", interval: 300}
  - {name: 🌐 全部节点, type: select, include-all: true}
  - {name: 🐟 漏网之鱼, type: select, proxies: [🚀 默认代理, 🌐 全部节点]}

# 6. 规则路由
rules:
  - RULE-SET,private_ip,DIRECT,no-resolve
  - RULE-SET,private_domain,DIRECT
  # AI
  - RULE-SET,AI,🤖 AI服务
  - RULE-SET,Gemini,🤖 AI服务
  # 流媒体分流 (全平台覆盖)
  - RULE-SET,Youtube_domain,📹 YouTube
  - RULE-SET,Netflix_domain,🎥 NETFLIX
  - RULE-SET,Disney_domain,🏰 Disney
  - RULE-SET,HBO_domain,🎬 HBO
  - RULE-SET,PrimeVideo_domain,🎬 PrimeVideo
  - RULE-SET,Spotify_domain,🎵 Spotify
  - RULE-SET,Tiktok_domain,🎵 TikTok
  
  # 社交与系统
  - RULE-SET,Telegram_domain,🚀 默认代理
  - RULE-SET,Google_domain,🚀 默认代理
  - RULE-SET,Apple_domain,DIRECT
  - RULE-SET,GitHub_domain,👨🏿‍💻 GitHub
  - RULE-SET,Microsoft_domain,🪟 Microsoft
  # 游戏与支付
  - RULE-SET,Steam_domain,🎮 Steam
  - RULE-SET,Paypal_domain,💶 Paypal
  # 国内直连
  - RULE-SET,cn_domain,DIRECT
  - RULE-SET,cn_ip,DIRECT,no-resolve
  - MATCH,🐟 漏网之鱼

# 7. 规则提供者
rule-providers:
  fakeipfilter_domain: {<<: *domain, url: "https://raw.githubusercontent.com/wwqgtxx/clash-rules/release/fakeip-filter.mrs"}
