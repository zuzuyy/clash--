# 规则匹配（优化优先级与效率）
rules:
  # 第一优先级：私有IP/域名（直连，不解析）
  - RULE-SET,private_ip,直连,no-resolve
  - RULE-SET,private_domain,直连,no-resolve
  
  # 第二优先级：本地DNS污染规避
  - DOMAIN-SUFFIX,local,直连,no-resolve
  - DOMAIN-SUFFIX,lan,直连,no-resolve
  
  # 第三优先级：AI服务（高频场景前置）
  - RULE-SET,ai,🤖 ChatGPT
  - RULE-SET,gemini,♊ Gemini
  - RULE-SET,perplexity,🟣 Perplexity
  - RULE-SET,grok,🗿 Grok
  - RULE-SET,meta_ai,♾️ Meta AI
  
  # 第四优先级：常用媒体/社交
  - RULE-SET,telegram_domain,📲 Telegram
  - RULE-SET,telegram_ip,📲 Telegram,no-resolve
  - RULE-SET,youtube_domain,📹 YouTube
  - RULE-SET,google_domain,🍀 Google
  - RULE-SET,google_ip,🍀 Google,no-resolve
  
  # 第五优先级：办公/系统服务
  - RULE-SET,github_domain,👨🏿‍💻 GitHub
  - RULE-SET,onedrive_domain,🐬 OneDrive
  - RULE-SET,microsoft_domain,🪟 Microsoft
  - RULE-SET,apple_domain,直连
  - RULE-SET,apple_ip,直连
  
  # 第六优先级：其他社交/媒体
  - RULE-SET,tiktok_domain,🎵 TikTok
  - RULE-SET,facebook_domain,👥 Facebook/Meta
  - RULE-SET,whatsapp_domain,💬 WhatsApp
  - RULE-SET,netflix_domain,🎥 NETFLIX
  - RULE-SET,netflix_ip,🎥 NETFLIX,no-resolve
  - RULE-SET,disney_domain,🏰 Disney
  - RULE-SET,hbo_domain,🎬 HBO
  - RULE-SET,spotify_domain,🎵 Spotify
  - RULE-SET,twitch_domain,🟣 Twitch
  
  # 第七优先级：购物/支付/游戏
  - RULE-SET,amazon_domain,🛒 Amazon
  - RULE-SET,steam_domain,🎮 Steam
  - RULE-SET,paypal_domain,💶 PayPal
  
  # 第八优先级：国内/国外分流
  - RULE-SET,geolocation-!cn,🚀 默认代理
  - RULE-SET,cn_domain,直连
  - RULE-SET,cn_ip,直连,no-resolve
  
  # 最后兜底：漏网之鱼
  - MATCH,🐟 漏网之鱼

# 规则锚点（统一配置，减少冗余）
rule-anchor:
  ip: &ip
    type: http
    interval: 86400
    behavior: ipcidr
    format: mrs
    path: ./ruleset/ip # 规则缓存路径
  domain: &domain
    type: http
    interval: 86400
    behavior: domain
    format: mrs
    path: ./ruleset/domain # 规则缓存路径
  class: &class
    type: http
    interval: 86400
    behavior: classical
    format: text
    path: ./ruleset/class # 规则缓存路径

# 规则集订阅（优化缓存与更新）
rule-providers: 
  # FakeIP过滤
  fakeipfilter_domain:
    <<: *domain
    url: "https://raw.githubusercontent.com/wwqgtxx/clash-rules/release/fakeip-filter.mrs"
  
  # 私有地址/域名
  private_domain:
